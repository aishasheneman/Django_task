{% extends 'base.html' %}
{% load static %}

{% block title %}تسجيل الدخول - إبداع تك{% endblock %}

{% block content %}
<main class="form-page-wrapper animate-fade-in">
    <div class="container" style="max-width: 450px; margin: 50px auto;">
        <div class="form-card" style="padding: 30px; background: #fff; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="text-align: center; margin-bottom: 20px;">تسجيل الدخول</h2>
            
            <form method="POST" class="main-django-form">
                {% csrf_token %}
                <div class="form-group" style="margin-bottom: 15px;">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 10px; border-radius: 8px;">دخول</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px;">
                ليس لديك حساب؟ <a href="{% url 'register' %}" style="color: #4f46e5; font-weight: bold;">إنشاء حساب جديد</a>
            </p>
        </div>
    </div>
</main>
{% endblock %}
